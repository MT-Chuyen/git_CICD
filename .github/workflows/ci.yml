name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: Lint, validate, smoke train
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      EPOCHS: "1"
      BATCH: "2"
      IMGSZ: "320"
      WEIGHTS: "yolo11n.pt"
      RUN_NAME: "ci_smoke"
      WANDB_MODE: "disabled"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Validate dataset
        run: python scripts/validate_dataset.py

      - name: Pytest
        run: pytest -q

      - name: Smoke train (1 epoch, CPU)
        run: python train.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-run
          path: runs/detect/ci_smoke/
          if-no-files-found: ignore
          retention-days: 7
