name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-validate:
    name: Lint + dataset validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev deps (lightweight)
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pyyaml

      - name: Ruff
        run: ruff check .

      - name: Validate dataset
        run: python scripts/validate_dataset.py

      - name: Pytest (dataset checks only — no torch needed)
        run: pytest tests/

  smoke-train:
    name: Smoke train (1 epoch, CPU)
    runs-on: ubuntu-latest
    needs: lint-and-validate
    timeout-minutes: 30
    env:
      CI: "true"
      EPOCHS: "1"
      BATCH: "2"
      IMGSZ: "320"
      WEIGHTS: "yolo11n.pt"
      RUN_NAME: "ci_smoke"
      WANDB_MODE: "disabled"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install training deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the install small
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -r requirements.txt

      - name: Run 1-epoch smoke train
        run: python train.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-run
          path: runs/detect/ci_smoke/
          if-no-files-found: ignore
          retention-days: 7
